name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            archive: tzap-${{ github.ref_name }}-linux-x86_64.tar.gz
            run_smoke: true
            macosx_deployment_target: ""
            rustflags: ""
          - name: linux-x86_64-musl
            os: ubuntu-22.04
            target: x86_64-unknown-linux-musl
            archive: tzap-${{ github.ref_name }}-linux-x86_64-musl.tar.gz
            run_smoke: true
            macosx_deployment_target: ""
            rustflags: ""
          - name: macos-x86_64
            os: macos-15-intel
            target: x86_64-apple-darwin
            archive: tzap-${{ github.ref_name }}-macos-x86_64.tar.gz
            run_smoke: true
            macosx_deployment_target: "10.12"
            rustflags: ""
          - name: macos-aarch64
            os: macos-14
            target: aarch64-apple-darwin
            archive: tzap-${{ github.ref_name }}-macos-aarch64.tar.gz
            run_smoke: true
            macosx_deployment_target: "11.0"
            rustflags: ""
          - name: windows-x86_64
            os: windows-2022
            target: x86_64-pc-windows-msvc
            archive: tzap-${{ github.ref_name }}-windows-x86_64.zip
            run_smoke: true
            macosx_deployment_target: ""
            rustflags: "-C target-feature=+crt-static"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          echo "CC_x86_64_unknown_linux_musl=musl-gcc" >> "$GITHUB_ENV"

      - name: Build
        env:
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macosx_deployment_target }}
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: cargo build --locked --release -p tzap --target ${{ matrix.target }}

      - name: Smoke test build
        if: runner.os != 'Windows' && matrix.run_smoke
        run: |
          ./target/${{ matrix.target }}/release/tzap --version
          ./target/${{ matrix.target }}/release/tzap --help

      - name: Smoke test build (Windows)
        if: runner.os == 'Windows' && matrix.run_smoke
        shell: pwsh
        run: |
          & "target/${{ matrix.target }}/release/tzap.exe" --version
          & "target/${{ matrix.target }}/release/tzap.exe" --help

      - name: Package Unix
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist package
          cp target/${{ matrix.target }}/release/tzap package/tzap
          tar -czf "dist/${{ matrix.archive }}" -C package tzap

      - name: Generate checksum (Unix)
        if: runner.os != 'Windows'
        run: |
          cd dist
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${{ matrix.archive }}"
          else
            shasum -a 256 "${{ matrix.archive }}"
          fi > "${{ matrix.archive }}.sha256"

      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist, package
          Copy-Item "target/${{ matrix.target }}/release/tzap.exe" package/tzap.exe
          Compress-Archive -Path package/tzap.exe -DestinationPath "dist/${{ matrix.archive }}"

      - name: Generate checksum (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $hash = Get-FileHash -Path "dist/${{ matrix.archive }}" -Algorithm SHA256
          "{0}  {1}" -f $hash.Hash.ToLowerInvariant(), "${{ matrix.archive }}" | Set-Content -Path "dist/${{ matrix.archive }}.sha256"

      - name: Upload asset
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            dist/${{ matrix.archive }}
            dist/${{ matrix.archive }}.sha256

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-22.04
    needs: build

    steps:
      - name: Download assets
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Merge checksum manifest
        run: |
          cd dist
          (sha256sum *.tar.gz *.zip 2>/dev/null || shasum -a 256 *.tar.gz *.zip 2>/dev/null) > SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
