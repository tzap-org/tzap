name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            archive: tzap-${{ github.ref_name }}-linux-x86_64.tar.gz
          - name: macos
            os: macos-latest
            archive: tzap-${{ github.ref_name }}-macos.tar.gz
          - name: windows-x86_64
            os: windows-latest
            archive: tzap-${{ github.ref_name }}-windows-x86_64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --locked --release -p tzap

      - name: Package Unix
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist package
          cp target/release/tzap package/tzap
          tar -czf "dist/${{ matrix.archive }}" -C package tzap

      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist, package
          Copy-Item target/release/tzap.exe package/tzap.exe
          Compress-Archive -Path package/tzap.exe -DestinationPath "dist/${{ matrix.archive }}"

      - name: Upload asset
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.archive }}

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download assets
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
