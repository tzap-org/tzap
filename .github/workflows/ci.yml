name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  rust:
    name: Rust
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            run_fmt: true
          - os: macos-latest
            run_fmt: false
          - os: windows-latest
            run_fmt: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        if: ${{ matrix.run_fmt }}
        run: cargo fmt --all -- --check

      - name: Check workspace
        run: cargo check --workspace --all-targets --locked

      - name: Run tests
        run: cargo test --workspace --locked
